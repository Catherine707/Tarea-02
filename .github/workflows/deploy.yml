name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - assignment-03

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: assignment-03
  ECR_REGISTRY: 283625861971.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: latest
  EB_APPLICATION_NAME: assignment-03
  EB_ENVIRONMENT_NAME: Assignment-03-env

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build Docker image
        run: docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      - name: Tag Docker image
        run: docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push Docker image to ECR
        run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Generate Dockerrun.aws.json
        run: |
          printf '{
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "%s/%s:%s",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": 80
              }
            ]
          }' "$ECR_REGISTRY" "$ECR_REPOSITORY" "$IMAGE_TAG" > Dockerrun.aws.json

      - name: Zip application
        run: zip -r deploy.zip Dockerrun.aws.json

      - name: Deploy to Elastic Beanstalk
  uses: einaregilsson/beanstalk-deploy@v21
  with:
    aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
    aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    application_name: ${{ env.EB_APPLICATION_NAME }}
    environment_name: ${{ env.EB_ENVIRONMENT_NAME }}
    version_label: ${{ github.sha }}
    region: ${{ env.AWS_REGION }}
    deployment_package: deploy.zip
